<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Chat</title>
    <style>
        /* 
        ==========================
        POPUP STYLES
        ==========================
        This CSS makes our popup look professional and clean
        The popup appears when user clicks the extension icon
        */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Makes sizing easier to manage */
        }
        
        body {
            width: 350px;              /* Fixed width for popup */
            min-height: 400px;         /* Minimum height */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        h1 {
            font-size: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        /* Status indicator (shows if server is running) */
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status.connected {
            background: rgba(16, 185, 129, 0.2); /* Green tint */
            border: 2px solid #10b981;
        }
        
        .status.disconnected {
            background: rgba(239, 68, 68, 0.2); /* Red tint */
            border: 2px solid #ef4444;
        }
        
        .status.checking {
            background: rgba(251, 191, 36, 0.2); /* Yellow tint */
            border: 2px solid #fbbf24;
        }
        
        /* Settings section */
        .settings {
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .settings h2 {
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .input-group {
            margin-bottom: 12px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        .input-group input:focus {
            outline: 2px solid #10b981;
            background: #fff;
        }
        
        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button.primary {
            background: #10b981;
            color: white;
        }
        
        button.primary:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        button.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-top: 8px;
        }
        
        button.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Quick actions */
        .actions {
            display: grid;
            gap: 8px;
            margin-top: 16px;
        }
        
        /* Info text */
        .info {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 12px;
            text-align: center;
            line-height: 1.5;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 
    ==========================
    POPUP CONTENT
    ==========================
    This is what users see when they click your extension icon
    -->
    
    <h1>🤖 YouTube AI Chat</h1>
    
    <!-- Status indicator - shows if Python server is running -->
    <div id="status" class="status checking">
        <span id="status-text">Checking server...</span>
    </div>
    
    <!-- Settings panel -->
    <div class="settings">
        <h2>⚙️ Settings</h2>
        
        <!-- Server URL input -->
        <div class="input-group">
            <label for="server-url">Backend Server URL:</label>
            <input 
                type="text" 
                id="server-url" 
                placeholder="http://localhost:8000"
                value="http://localhost:8000"
            >
        </div>
        
        <!-- Save button -->
        <button id="save-settings" class="primary">
            💾 Save Settings
        </button>
    </div>
    
    <!-- Quick action buttons -->
    <div class="actions">
        <button id="open-chat" class="secondary">
            💬 Open Chat on Current Video
        </button>
        <button id="test-connection" class="secondary">
            🔍 Test Server Connection
        </button>
    </div>
    
    <!-- Info text -->
    <div class="info">
        📝 Make sure your Python backend is running on the server URL above.
        <br>
        Then open any YouTube video to start chatting!
    </div>
    
    <!-- 
    ==========================
    JAVASCRIPT
    ==========================
    The logic that makes everything work
    We'll put this in a separate file for organization
    -->
    <script src="popup.js"></script>
</body>
</html>
